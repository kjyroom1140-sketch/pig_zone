<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>일정(작업) 관리 - 양돈농장 관리 시스템</title>
    <link rel="stylesheet" href="/css/admin.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/farm_facilities.css">
</head>

<body data-dashboard-page="schedule">
    <div id="dashboard-header-nav-placeholder"></div>

    <main class="main-content dashboard-main dashboard-section-schedule">
        <div class="dashboard-schedule-layout">
            <div class="dashboard-schedule-top-bar">
                <div class="schedule-search-wrap">
                    <input type="text" id="scheduleSearchInput" class="schedule-search-input" placeholder="시설명·일정 검색..." title="Esc로 지우기" />
                </div>
                <div class="schedule-week-nav-center">
                    <button type="button" class="schedule-nav-arrow" id="scheduleWeekPrev" title="1일 전">‹</button>
                    <button type="button" class="schedule-calendar-icon" id="scheduleCalendarIcon" title="한 달 달력">📅</button>
                    <button type="button" class="schedule-nav-arrow" id="scheduleWeekNext" title="1일 후">›</button>
                    <button type="button" class="schedule-nav-today" id="scheduleWeekToday" title="이번 주">오늘</button>
                </div>
            </div>
            <div class="dashboard-schedule-grid-wrap">
                <table class="schedule-grid-table">
                    <thead>
                        <tr>
                            <th class="schedule-grid-col-structure schedule-grid-header-structure">농장 구조</th>
                            <th class="schedule-grid-col-day" id="scheduleThDay0">—</th>
                            <th class="schedule-grid-col-day" id="scheduleThDay1">—</th>
                            <th class="schedule-grid-col-day" id="scheduleThDay2">—</th>
                            <th class="schedule-grid-col-day" id="scheduleThDay3">—</th>
                            <th class="schedule-grid-col-day" id="scheduleThDay4">—</th>
                            <th class="schedule-grid-col-day" id="scheduleThDay5">—</th>
                            <th class="schedule-grid-col-day" id="scheduleThDay6">—</th>
                        </tr>
                    </thead>
                    <tbody id="dashboardScheduleGridBody">
                        <tr><td colspan="8" class="schedule-grid-empty">데이터를 불러오는 중...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- 작업 추가 모달 -->
    <div id="scheduleAddWorkPlanModal" class="schedule-modal-overlay" style="display: none;">
        <div class="schedule-modal-box">
            <div class="schedule-modal-header schedule-add-work-header">
                <h3>작업 추가</h3>
                <button type="button" class="schedule-modal-close" id="scheduleAddWorkPlanModalClose" aria-label="닫기">×</button>
            </div>
            <div class="schedule-modal-body">
                <p id="scheduleAddWorkPlanTargetLabel" class="schedule-add-target-label"></p>
                <div id="scheduleAddWorkPlanNoPigsNotice" class="schedule-add-no-pigs" style="display: none;">
                    <span class="schedule-add-no-pigs-icon" aria-hidden="true">ℹ️</span>
                    <p class="schedule-add-no-pigs-text">선택한 대상에 <strong>사육두수</strong>가 없습니다. 전입 또는 시설 작업만 추가할 수 있습니다.</p>
                </div>
                <!-- 일반 모드: 일정(작업) 단일 셀렉트 -->
                <div id="scheduleAddWorkPlanItemGroup" class="form-group">
                    <label for="scheduleAddWorkPlanItem">일정(작업) *</label>
                    <select id="scheduleAddWorkPlanItem">
                        <option value="">선택하세요</option>
                    </select>
                    <p id="scheduleAddWorkPlanNoItems" class="schedule-add-hint" style="display: none;">등록된 일정이 없습니다. farm_admin에서 일정을 먼저 등록하세요.</p>
                </div>
                <!-- 사육두수 없을 때: 구분(전입/시설) + 전입 패널 또는 시설 패널 -->
                <div id="scheduleAddWorkPlanNoPigsGroup" style="display: none;">
                    <div class="form-group form-group-inline">
                        <label for="scheduleAddWorkPlanKind" class="form-label-inline">구분 *</label>
                        <select id="scheduleAddWorkPlanKind" class="form-control-inline">
                            <option value="">선택하세요</option>
                            <option value="entry">전입</option>
                            <option value="facility">시설</option>
                        </select>
                    </div>
                    <div id="scheduleAddWorkPlanEntryPanel" class="schedule-add-entry-panel" style="display: none;">
                        <div class="form-group form-group-inline">
                            <label for="scheduleAddWorkPlanEntrySource" class="form-label-inline">전입처 *</label>
                            <input type="text" id="scheduleAddWorkPlanEntrySource" class="form-control-inline" placeholder="예: 육성사 3번방" maxlength="200">
                        </div>
                        <div class="form-group form-group-inline">
                            <label for="scheduleAddWorkPlanBreed" class="form-label-inline">품종</label>
                            <select id="scheduleAddWorkPlanBreed" class="form-control-inline">
                                <option value="">선택하세요</option>
                            </select>
                        </div>
                        <div class="form-group form-group-inline">
                            <label for="scheduleAddWorkPlanEntryCount" class="form-label-inline">전입 두수 *</label>
                            <input type="number" id="scheduleAddWorkPlanEntryCount" class="form-control-inline" min="1" placeholder="두">
                        </div>
                    </div>
                    <div id="scheduleAddWorkPlanFacilityPanel" class="schedule-add-facility-panel" style="display: none;">
                        <div class="form-group form-group-inline">
                            <label for="scheduleAddWorkPlanFacilityItem" class="form-label-inline">시설 작업 *</label>
                            <select id="scheduleAddWorkPlanFacilityItem" class="form-control-inline">
                                <option value="">선택하세요</option>
                            </select>
                        </div>
                        <p id="scheduleAddWorkPlanNoFacilityItems" class="schedule-add-hint" style="display: none;">해당 장소의 시설 일정이 없습니다. farm_admin에서 시설·관리/환경/방역 일정을 등록하세요.</p>
                    </div>
                </div>
                <!-- 예정 시작일/종료일 (전입일 때는 숨김) -->
                <div id="scheduleAddWorkPlanDateRangeRow" class="form-row">
                    <div class="form-group">
                        <label for="scheduleAddWorkPlanStart">예정 시작일 *</label>
                        <input type="date" id="scheduleAddWorkPlanStart">
                    </div>
                    <div class="form-group">
                        <label for="scheduleAddWorkPlanEnd">예정 종료일 *</label>
                        <input type="date" id="scheduleAddWorkPlanEnd">
                    </div>
                </div>
                <!-- 전입일 때만: 전입예정일 + 완료 체크 -->
                <div id="scheduleAddWorkPlanEntryDateRow" style="display: none;">
                    <div class="form-group form-group-inline">
                        <label for="scheduleAddWorkPlanPlannedDate" id="scheduleAddWorkPlanPlannedDateLabel" class="form-label-inline">전입예정일 *</label>
                        <input type="date" id="scheduleAddWorkPlanPlannedDate" class="form-control-inline">
                    </div>
                    <div class="form-group form-group-inline">
                        <label class="form-label-inline">완료 체크</label>
                        <label class="schedule-add-complete-check-wrap"><input type="checkbox" id="scheduleAddWorkPlanCompletedCheck"><span>완료함</span></label>
                    </div>
                </div>
            </div>
            <div class="schedule-modal-footer">
                <button type="button" class="btn btn-secondary" id="scheduleAddWorkPlanCancel">취 소</button>
                <button type="button" class="btn btn-primary" id="scheduleAddWorkPlanSubmit">저 장</button>
            </div>
        </div>
    </div>

    <style>
        .schedule-modal-overlay { position: fixed; left: 0; top: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .schedule-modal-box { background: #fff; border-radius: 12px; min-width: 360px; max-width: 480px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); overflow: hidden; }
        .schedule-modal-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid #e5e7eb; border-radius: 12px 12px 0 0; }
        .schedule-add-work-header { background: #1e40af; color: #fff; border-bottom-color: #1e3a8a; }
        .schedule-add-work-header h3 { margin: 0; font-size: 18px; font-weight: 600; color: #fff; }
        .schedule-add-work-header .schedule-modal-close { color: #e0e7ff; }
        .schedule-add-work-header .schedule-modal-close:hover { color: #fff; }
        .schedule-modal-header h3 { margin: 0; font-size: 18px; font-weight: 600; }
        .schedule-modal-close { background: none; border: none; font-size: 24px; cursor: pointer; color: #6b7280; line-height: 1; padding: 0 4px; }
        .schedule-modal-close:hover { color: #111; }
        .schedule-modal-body { padding: 20px; }
        .schedule-add-target-label { margin: 0 0 12px; font-size: 16px; font-weight: 700; color: #374151; }
        .schedule-modal-body .form-group { margin-bottom: 16px; }
        .schedule-modal-body .form-row { display: flex; gap: 16px; }
        .schedule-modal-body .form-row .form-group { flex: 1; }
        .schedule-modal-body label { display: block; margin-bottom: 6px; font-weight: 500; color: #374151; font-size: 14px; }
        .schedule-modal-body select, .schedule-modal-body input[type=date] { width: 100%; padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
        .schedule-add-hint { font-size: 13px; color: #6b7280; margin-top: 6px; }
        .schedule-add-no-pigs { display: flex; align-items: flex-start; gap: 10px; margin: 0 0 16px; padding: 12px 14px; background: #f0f9ff; border: 1px solid #bae6fd; border-radius: 8px; }
        .schedule-add-no-pigs-icon { font-size: 18px; line-height: 1.2; flex-shrink: 0; }
        .schedule-add-no-pigs-text { margin: 0; font-size: 13px; color: #0c4a6e; line-height: 1.45; }
        .schedule-add-no-pigs-text strong { font-weight: 600; }
        .form-group-inline { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; flex-wrap: nowrap; }
        .form-group-inline .form-label-inline { margin: 0; min-width: 72px; flex-shrink: 0; font-weight: 500; font-size: 14px; }
        .form-group-inline .form-control-inline { flex: 1; min-width: 0; padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
        .schedule-add-complete-check-wrap { display: inline-flex; align-items: center; gap: 6px; margin: 0; font-weight: normal; font-size: 14px; cursor: pointer; white-space: nowrap; }
        .schedule-add-complete-check-wrap input { margin: 0; flex-shrink: 0; }
        .schedule-add-entry-panel .form-group,
        .schedule-add-facility-panel .form-group { margin-bottom: 12px; }
        .schedule-modal-footer { display: flex; justify-content: flex-end; gap: 10px; padding: 16px 20px; border-top: 1px solid #e5e7eb; border-radius: 0 0 12px 12px; }
        .schedule-grid-day-cell { cursor: pointer; }
        .schedule-grid-day-cell:hover { background: #f3f4f6; }
    </style>

    <script src="/js/dashboard-common.js"></script>
    <script src="/js/dashboard-schedule.js"></script>
</body>

</html>
